# Définit le type de terminal pour avoir les 256 couleurs.
set -g default-terminal "tmux-256color"

# Active le support des vraies couleurs (true color / 24-bit).
set -ag terminal-overrides ",xterm-256color:RGB"

# Nombre de lignes conservées dans l'historique de scrollback.
set -g history-limit 10000

# Active le support de la souris :
# - Cliquer pour sélectionner un pane
# - Scroller pour remonter dans l'historique
# - Redimensionner les panes en glissant les bordures
set -g mouse on

# Les fenêtres commencent à 1 au lieu de 0.
set -g base-index 1
setw -g pane-base-index 1

# Renumérote automatiquement les fenêtres quand on en ferme une.
set -g renumber-windows on

# Supprime le délai après avoir appuyé sur Escape.
# Indispensable pour vim/neovim, sinon il y a un lag perceptible.
set -sg escape-time 0

# Envoie les événements de focus (gain/perte) aux applications.
# Permet à vim de détecter quand on revient dans le terminal (autoread).
set -g focus-events on

# Active l'intégration avec le clipboard système (nécessite terminal compatible OSC 52).
set -g set-clipboard on

# Nouvelle fenêtre dans le dossier courant (au lieu du home)
bind c new-window -c "#{pane_current_path}"

# prefix + C-w : saute à la 1re session Claude en attente -> sa fenêtre claude
bind C-w run-shell '~/.config/tmux/cc-goto.sh'

# prefix + N : crée une nouvelle session (demande le nom)
bind N command-prompt -p "Nouvelle session:" "new-session -s '%%'"

# prefix + C-h : aide-mémoire des raccourcis tmux (popup)
bind C-h display-popup -w 80% -h 80% -E "~/.config/tmux/tmux-cheatsheet.sh"

# prefix + PageUp / PageDown : onglet (window) précédent / suivant
bind PPage previous-window
bind NPage next-window

# Rafraîchit la barre chaque seconde (nécessaire au pulse d'alerte de cc-bar)
set -g status-interval 1

# Barre en HAUT, sur 4 lignes : alerte / spacer / onglets / spacer bas.
# Les deux spacers aèrent (au-dessus des onglets, et en dessous pour décoller de nvim).
set -g status-position top
set -g status 4

# Couleurs globales de la barre (fond gris foncé, texte gris clair)
set -g status-style 'bg=#16161e,fg=#c0caf5'

# Ligne 0 : zone d'alerte des AUTRES sessions (cc-bar) à gauche, horloge à droite.
# cc-bar liste toutes les sessions colorées par leur état Claude (🎯 = courante).
set -g status-format[0] "#[align=left]#(~/.config/tmux/cc-bar.sh #S)#[align=right]#[fg=#565f89]│ #[fg=#9ece6a]%H:%M #[fg=#565f89]│ #[fg=#bb9af7]%d-%b-%Y "

# Ligne 1 : spacer vide (fond barre) qui espace l'alerte des onglets. On y greffe
# cc-poll (sortie vide) : chaque tick il lit l'écran des fenêtres `waiting` et les
# repasse `running` si le spinner de Claude tourne (comble le trou sans hook).
set -g status-format[1] "#[align=centre]#(~/.config/tmux/cc-poll.sh)"

# Ligne 2 : onglets de la session COURANTE, pleine largeur (1/3 chacun si 3 windows),
# colorés par @cc_state -> l'onglet `claude` s'allume rouge (waiting) / vert (done).
# Rendu par cc-tabs (répartition équitable sur la largeur du client).
set -g status-format[2] "#(~/.config/tmux/cc-tabs.sh #{client_width} #S)"

# Ligne 3 : spacer bas SOUS les onglets, couleur du fond terminal/gnome (#16161e)
# pour aérer et décoller les onglets de nvim. `fill=` remplit toute la ligne d'un
# coup (pas de sous-process, robuste quel que soit le shell).
set -g status-format[3] "#[fill=#16161e]"

# Clic sur la barre : un onglet (range=window) -> select-window ; une session
# (range=user, cf cc-bar) -> switch-client vers le nom porté par #{mouse_status_range}.
bind -n MouseDown1Status {
    if -F '#{==:#{mouse_status_range},window}' {
        select-window -t=
    } {
        if -F '#{mouse_status_range}' {
            run-shell 'tmux switch-client -t "#{mouse_status_range}"'
        }
    }
}

# Pane inactif : bordure discrète (TokyoNight fg_gutter)
set -g pane-border-style 'fg=#292e42'

# Pane actif : bordure bleue, visible (TokyoNight blue)
set -g pane-active-border-style 'fg=#7aa2f7'

# To copy, left click and drag to highlight text in yellow,
# once you release left click yellow text will disappear and will automatically be available in clibboard
# # Use vim keybindings in copy mode
setw -g mode-keys vi
# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# Définit le type de terminal pour avoir les 256 couleurs.
set -g default-terminal "tmux-256color"

# Active le support des vraies couleurs (true color / 24-bit).
set -ag terminal-overrides ",xterm-256color:RGB"

# Nombre de lignes conservées dans l'historique de scrollback.
set -g history-limit 10000

# Active le support de la souris :
# - Cliquer pour sélectionner un pane
# - Scroller pour remonter dans l'historique
# - Redimensionner les panes en glissant les bordures
set -g mouse on

# Les fenêtres commencent à 1 au lieu de 0.
set -g base-index 1
setw -g pane-base-index 1

# Renumérote automatiquement les fenêtres quand on en ferme une.
set -g renumber-windows on

# Supprime le délai après avoir appuyé sur Escape.
# Indispensable pour vim/neovim, sinon il y a un lag perceptible.
set -sg escape-time 0

# Envoie les événements de focus (gain/perte) aux applications.
# Permet à vim de détecter quand on revient dans le terminal (autoread).
set -g focus-events on

# Active l'intégration avec le clipboard système (nécessite terminal compatible OSC 52).
set -g set-clipboard on

# Nouvelle fenêtre dans le dossier courant (au lieu du home)
bind c new-window -c "#{pane_current_path}"

# Rafraîchit la barre toutes les 5 secondes (pour l'heure notamment)
set -g status-interval 5

# Position de la barre en bas de l'écran
set -g status-position bottom

# Couleurs globales de la barre (fond gris foncé, texte gris clair)
set -g status-style 'bg=colour235,fg=colour250'

# Partie gauche : nom de session avec icône
set -g status-left-length 30
set -g status-left '#[fg=colour0,bg=colour4,bold]  #S #[fg=colour4,bg=colour235] '

# Partie droite : heure et date
set -g status-right-length 60
set -g status-right "#[fg=#565f89]│ #[fg=#9ece6a]%H:%M #[fg=#565f89]│ #[fg=#bb9af7]%d-%b-%Y "

# Pas de séparateur entre les onglets (on utilise les powerline arrows)
set -g window-status-separator ''

# Onglet inactif : discret
set -g window-status-format '#[fg=colour250,bg=colour235]  #I:#W  '

# Onglet actif : fond cyan, texte noir, avec powerline arrows
set -g window-status-current-format '#[fg=colour235,bg=colour6]#[fg=colour0,bg=colour6,bold] #I:#W #[fg=colour6,bg=colour235]'

# Pane inactif : bordure gris foncé, discret
set -g pane-border-style 'fg=colour238'

# Pane actif : bordure cyan, visible
set -g pane-active-border-style 'fg=colour6'

# To copy, left click and drag to highlight text in yellow,
# once you release left click yellow text will disappear and will automatically be available in clibboard
# # Use vim keybindings in copy mode
setw -g mode-keys vi
# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# ~/.tmux.conf - Tmux configuration

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null || pbcopy 2>/dev/null"
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Window navigation ---
bind -r C-h previous-window
bind -r C-l next-window

# --- Status bar ---
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#565f89]│ "
set -g status-right "#[fg=#565f89]│ #[fg=#9ece6a]%H:%M #[fg=#565f89]│ #[fg=#bb9af7]%d-%b-%Y "

# Window status
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W* "

# --- Pane borders ---
set -g pane-border-style "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

# --- Messages ---
set -g message-style "bg=#1a1b26,fg=#7aa2f7"

# Starship prompt configuration
# https://starship.rs/config/

# Timeout for commands (ms)
command_timeout = 500

# Newline between prompts
add_newline = true

# Prompt format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$docker_context\
$kubernetes\
$python\
$ruby\
$nodejs\
$rust\
$golang\
$java\
$terraform\
$aws\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold yellow"

[docker_context]
format = "[$symbol$context]($style) "
symbol = " "

[kubernetes]
disabled = false
format = "[$symbol$context( \\($namespace\\))]($style) "
symbol = "☸ "

[python]
format = "[$symbol$version( \\($virtualenv\\))]($style) "
symbol = " "

[ruby]
format = "[$symbol$version]($style) "
symbol = " "

[nodejs]
format = "[$symbol$version]($style) "
symbol = " "

[rust]
format = "[$symbol$version]($style) "
symbol = " "

[golang]
format = "[$symbol$version]($style) "
symbol = " "

[java]
format = "[$symbol$version]($style) "
symbol = " "

[terraform]
format = "[$symbol$workspace]($style) "

[aws]
format = "[$symbol$profile( \\($region\\))]($style) "
symbol = " "

[username]
show_always = false
format = "[$user]($style)@"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
